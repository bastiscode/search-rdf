datasets:
  - type: text
    name: wikidata-humans-labels
    output: data/
    source:
      type: sparql-query
      endpoint: https://qlever.dev/api/wikidata-sebastian
      query: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX wikibase: <http://wikiba.se/ontology#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX schema: <http://schema.org/>
        PREFIX wd: <http://www.wikidata.org/entity/>
        PREFIX wdt: <http://www.wikidata.org/prop/direct/>
        SELECT ?item ?label WHERE {
          ?item wdt:P31 wd:Q5 .
          ?item rdfs:label | skos:altLabel ?label .
          FILTER (LANG(?label) = "en")
          ?item ^schema:about/wikibase:sitelinks ?sitelinks
        }
        ORDER BY DESC(?sitelinks) DESC(?item)
        LIMIT 100000
      format: json

models:
  - name: text-embedding
    type: vllm
    endpoint: http://localhost:8000
    model_name: mixedbread-ai/mxbai-embed-xsmall-v1

embeddings:
  - name: wikidata-humans-embeddings
    model: text-embedding
    output: data/embeddings.safetensors
    type: text
    dataset: data/
    batch_size: 128

indices:
  - name: wikidata-humans-keyword
    type: keyword
    text_data: data/
    output: index/keyword/
  - name: wikidata-humans-embedding
    type: text-embedding
    text_data: data/
    embedding_data: data/embeddings.safetensors
    output: index/embedding/
    model: text-embedding

server:
  host: 0.0.0.0
  port: 8080
  cors: true
  models:
    - text-embedding
  indices:
    - wikidata-humans-keyword
    - wikidata-humans-embedding

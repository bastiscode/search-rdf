# Configuration for building a keyword index of Wikidata humans
# This example demonstrates fetching data from Wikidata's SPARQL endpoint
# and building a searchable keyword index

datasets:
  - type: text
    name: wikidata-humans
    output: data/
    source:
      type: sparql-query
      endpoint: https://qlever.cs.uni-freiburg.de/api/wikidata-sebastian
      query: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX wikibase: <http://wikiba.se/ontology#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX schema: <http://schema.org/>
        PREFIX wd: <http://www.wikidata.org/entity/>
        PREFIX wdt: <http://www.wikidata.org/prop/direct/>
        SELECT ?item ?label WHERE {
          ?item wdt:P31 wd:Q5 .
          ?item rdfs:label | skos:altLabel ?label .
          FILTER (LANG(?label) = "en")
          ?item ^schema:about/wikibase:sitelinks ?sitelinks
        }
        ORDER BY DESC(?sitelinks) DESC(?item)
      format: json

indices:
  - name: wikidata-humans-keyword
    type: keyword
    text_data: data/
    output: index/

server:
  host: 0.0.0.0
  port: 8080
  cors: true
  indices:
    - wikidata-humans-keyword

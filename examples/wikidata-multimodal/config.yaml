datasets:
  - name: nature
    output: data/
    source:
      type: sparql-query
      default_field_type: text
      endpoint: https://qlever.dev/api/wikidata-sebastian
      query: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX schema: <http://schema.org/>
        PREFIX wd: <http://www.wikidata.org/entity/>
        PREFIX wdt: <http://www.wikidata.org/prop/direct/>
        SELECT DISTINCT ?id ?value WHERE {
          {
            ?id wdt:P279* wd:Q729 .
          } UNION {
            ?id wdt:P279* wd:Q756 .
          }
          {
            ?id @en@rdfs:label | @en@skos:altLabel | @en@schema:description ?value .
          }
        }
      format: json

models:
  - name: clip
    type: open-clip
    model: hf-hub:timm/ViT-B-16-SigLIP2
    device: cuda
    batch_size: 32

embeddings:
  - name: nature-embeddings
    model: clip
    output: data/embeddings.safetensors
    data: data/
    batch_size: 128

indices:
  - name: nature
    description: Multimodal search over Wikidata nature entities using CLIP
    type: embedding-with-data
    data: data/
    embedding_data: data/embeddings.safetensors
    model: clip
    output: index/

server:
  host: 0.0.0.0
  port: 8080
  cors: true
  indices:
    - nature

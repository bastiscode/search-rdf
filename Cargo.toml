[package]
name = "search-rdf"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "search_rdf"
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0"
memmap2 = "0.9"
itertools = "0.14"
any_ascii = "0.3"
ordered-float = "5"
pathfinding = "4.14"
pathdiff = "0.2"
usearch = "2.12"
safetensors = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = { version = "2.0", features = ["serde"] }
pyo3 = { version = "0.27", features = [
  "anyhow",
  "abi3-py312",
  "auto-initialize",
] }
byte-trie = { path = "./byte-trie" }
sparesults = "0.3"
oxrdf = "0.3"
ureq = { version = "3.1", features = ["json"] }

[dev-dependencies]
tempfile = "3.6"
criterion = "0.7"

[[bench]]
name = "benchmark"
harness = false
